<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a7c3f"/>
      <stop offset="100%" stop-color="#2d5a27"/>
    </linearGradient>
    <linearGradient id="stump" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c4944a"/>
      <stop offset="100%" stop-color="#8b6834"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#6abf4b"/>
      <stop offset="100%" stop-color="#3d8c2e"/>
    </linearGradient>
  </defs>

  <!-- Rounded background -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#bg)"/>

  <!-- Ground -->
  <ellipse cx="32" cy="50" rx="18" ry="4" fill="rgba(0,0,0,0.15)"/>

  <!-- Stump body -->
  <rect x="22" y="32" width="20" height="18" rx="3" fill="url(#stump)"/>
  <!-- Stump top -->
  <ellipse cx="32" cy="32" rx="11" ry="4" fill="#d4a45a"/>

  <!-- Sprout stem -->
  <line x1="32" y1="32" x2="32" y2="18" stroke="#5a9040" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Left leaf -->
  <path d="M31 22 C27 17, 21 14, 19 13 C18 14, 20 16, 24 19 C27 21, 30 22, 31 23 Z" fill="url(#leaf)"/>
  <!-- Right leaf -->
  <path d="M33 20 C37 15, 42 13, 44 12 C45 13, 43 15, 39 18 C36 20, 34 20, 33 21 Z" fill="#5aaf3b"/>
  <!-- Top leaf -->
  <ellipse cx="32" cy="16" rx="3" ry="4" fill="#6abf4b" transform="rotate(-5 32 16)"/>

  <!-- Eyes -->
  <circle cx="28" cy="39" r="2" fill="#3a2a15"/>
  <circle cx="36" cy="39" r="2" fill="#3a2a15"/>
  <!-- Eye highlights -->
  <circle cx="28.8" cy="38.2" r="0.8" fill="white" opacity="0.8"/>
  <circle cx="36.8" cy="38.2" r="0.8" fill="white" opacity="0.8"/>

  <!-- Smile -->
  <path d="M29 43 Q32 46 35 43" stroke="#3a2a15" stroke-width="1.5" fill="none" stroke-linecap="round"/>
</svg>
